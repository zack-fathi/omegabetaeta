services:
  - type: web
    name: omegabetaeta
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 3 -b 0.0.0.0:$PORT obhapp:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: PORTAL_CALENDAR_ID
        sync: false
      - key: PUBLIC_CALENDAR_ID
        sync: false
      - key: EMAIL_ADDRESS
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: SITE_URL
        sync: false
      - key: RENDER_DISK_PATH
        value: /var/data
    disk:
      name: obh-data
      mountPath: /var/data
      sizeGB: 1
