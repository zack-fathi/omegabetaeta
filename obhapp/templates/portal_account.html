{% extends 'portal_base.html' %}

{% block content %}
<div class="container-fluid member-detail">
    <h2 class="portal-heading text-center">My Account</h2>

    <!-- Profile Section -->
    <div class="member-profile-card">
        <div class="member-profile-header">
            <div class="member-profile-avatar">
                <img src="/uploads/{{ brother['profile_picture'] or 'default.jpg' }}" alt="{{ brother['fullname'] }}">
                <span class="status-dot large {{ 'active' if brother['active'] else 'inactive' }}"></span>
            </div>
            <div class="member-profile-title">
                <h3>{{ brother['fullname'] }}</h3>
                <span class="member-profile-subtitle">@{{ brother['username'] }}</span>
                <span class="member-profile-id">ID: {{ brother['user_id'] }}</span>
            </div>
        </div>
        <div class="member-profile-body">
            <form id="edit-profile-form" action="{{ url_for('edit_profile') }}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="existing_profile_picture" value="{{ brother['profile_picture'] }}">
                <div class="member-edit-grid">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" class="form-control" id="username" name="username" value="{{ brother['username'] }}" required>
                    </div>
                    <div class="form-group">
                        <label for="fullname">Full Name</label>
                        <input type="text" class="form-control" id="fullname" name="fullname" value="{{ brother['fullname'] }}" required>
                    </div>
                    <div class="form-group">
                        <label for="major">Major</label>
                        <input type="text" class="form-control" id="major" name="major" value="{{ brother['major'] }}">
                    </div>
                    <div class="form-group">
                        <label for="job">Job</label>
                        <input type="text" class="form-control" id="job" name="job" value="{{ brother['job'] }}">
                    </div>
                    <div class="form-group">
                        <label for="contacts">Contacts</label>
                        <input type="text" class="form-control" id="contacts" name="contacts" value="{{ brother['contacts'] }}">
                    </div>
                    <div class="form-group">
                        <label for="grad_time">Grad Time</label>
                        <input type="month" class="form-control" id="grad_time" name="grad_time" value="{{ brother['grad_time'] }}">
                    </div>
                </div>
                <div class="form-group mt-3">
                    <label for="desc">Description</label>
                    <textarea class="form-control auto-resize" id="desc" name="desc" rows="3">{{ brother['desc'] }}</textarea>
                </div>
                <div class="form-group mt-3">
                    <label>Profile Picture</label>
                    <div class="d-flex align-items-center gap-3">
                        <img src="/uploads/{{ brother['profile_picture'] or 'default.jpg' }}" class="img-thumbnail" style="max-width:60px; border-radius:6px; background:var(--portal-surface-light); border-color:var(--portal-border);">
                        <input type="file" class="form-control" id="profile_picture" name="profile_picture" accept="image/*">
                    </div>
                </div>
                <div class="form-check mt-3">
                    <input type="checkbox" class="form-check-input" id="active" name="active" value="1" {% if brother['active'] %}checked{% endif %}>
                    <label class="form-check-label" for="active">Active Member</label>
                </div>
                <div class="member-edit-actions mt-4">
                    <button type="submit" class="btn btn-portal"><i class="fas fa-save me-1"></i>Update Profile</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Change Password Section -->
    <div class="member-profile-card mt-4">
        <div class="member-profile-header">
            <h3 style="margin:0;"><i class="fas fa-lock me-2"></i>Change Password</h3>
        </div>
        <div class="member-profile-body">
            <div id="alert-error" class="alert alert-danger" style="display:none;"></div>
            <div id="alert-success" class="alert alert-success" style="display:none;"></div>
            <form id="change-password-form" action="{{ url_for('change_password') }}" method="post">
                <div class="member-edit-grid">
                    <div class="form-group">
                        <label for="current_password">Current Password</label>
                        <input type="password" class="form-control" id="current_password" name="current_password" required>
                    </div>
                    <div class="form-group">
                        <label for="new_password">New Password</label>
                        <input type="password" class="form-control" id="new_password" name="new_password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm_new_password">Confirm New Password</label>
                        <input type="password" class="form-control" id="confirm_new_password" name="confirm_new_password" required>
                    </div>
                </div>
                <div class="member-edit-actions mt-4">
                    <button type="submit" class="btn btn-portal"><i class="fas fa-key me-1"></i>Change Password</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function showAlert(message, type) {
        const alertBox = document.getElementById(type);
        alertBox.textContent = message;
        alertBox.style.display = '';
    }

    document.getElementById('change-password-form').addEventListener('submit', function(event) {
        event.preventDefault();

        const currentPassword = document.getElementById('current_password').value;
        const newPassword = document.getElementById('new_password').value;
        const confirmNewPassword = document.getElementById('confirm_new_password').value;

        document.getElementById('alert-error').style.display = 'none';
        document.getElementById('alert-success').style.display = 'none';

        if (newPassword !== confirmNewPassword) {
            showAlert("New passwords do not match.", 'alert-error');
            return;
        }

        fetch(this.action, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: new URLSearchParams(new FormData(this))
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) {
                showAlert(data.error, 'alert-error');
            } else {
                showAlert(data.success, 'alert-success');
            }
        })
        .catch(function() {
            showAlert("Something went wrong.", 'alert-error');
        });
    });
</script>
{% endblock %}
