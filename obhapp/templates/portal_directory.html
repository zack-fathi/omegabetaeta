{% extends 'portal_base.html' %}
{% block content %}
<div class="container mt-2">
    <h2 class="portal-heading text-center">Member Directory</h2>
    {% for key in brothers.keys() %}
        <section class="mb-4">
            <h4 class="portal-category-title">{{ key }}</h4>
            <div class="row g-3">
                {% for brother in brothers[key] %}
                    <div class="col-lg-3 col-md-4 col-sm-6">
                        <a class="link-no-style" href="/portal/directory/{{ brother['username'] }}/">
                            <div class="directory-card">
                                <h6>{{ brother['fullname'] }}</h6>
                                <small>#{{ brother['line_num'] }}</small>
                            </div>
                        </a>
                    </div>
                {% endfor %}
            </div>
        </section>
    {% endfor %}
</div>
{% endblock %}
