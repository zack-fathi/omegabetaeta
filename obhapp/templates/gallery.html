{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <h1 class="text-center mb-2" style="color: #FFD700; font-weight: 700;">Gallery</h1>
    <div style="width: 80px; height: 3px; background-color: #b22222; margin: 0 auto 2rem;"></div>
    {% if images %}
    <div class="row d-flex justify-content-center g-4">
        {% for image in images %}
        <div class="col-md-3 col-sm-6">
            <div class="card h-100 border-0 shadow" style="cursor: pointer; background-color: #2a2a2a; border-radius: 10px; overflow: hidden; transition: transform 0.2s;">
                <img 
                    src="/uploads/{{ image['filename'] }}" 
                    class="card-img-top img-fluid" 
                    alt="{{ image['desc'] }}" 
                    style="height: 220px; object-fit: cover;"
                    data-bs-toggle="modal" 
                    data-bs-target="#imageModal{{ loop.index }}"
                >
                {% if image['desc'] %}
                <div class="card-body py-2 text-center" style="background-color: #333;">
                    <small style="color: #ccc;">{{ image['desc'] }}</small>
                </div>
                {% endif %}
            </div>
        </div>

        <!-- Modal -->
        <div class="modal fade" id="imageModal{{ loop.index }}" tabindex="-1" aria-labelledby="imageModalLabel{{ loop.index }}" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content" style="background-color: #222; border: 1px solid #444;">
                    <div class="modal-header" style="border-bottom: 1px solid #444;">
                        <h5 class="modal-title" style="color: white;" id="imageModalLabel{{ loop.index }}">{{ image['desc'] }}</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body p-0">
                        <img 
                            src="/uploads/{{ image['filename'] }}" 
                            class="img-fluid w-100" 
                            alt="{{ image['desc'] }}"
                        >
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p class="text-center text-muted">No photos yet. Check back soon!</p>
    {% endif %}
</div>
{% endblock %}
