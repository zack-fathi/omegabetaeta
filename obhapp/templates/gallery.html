{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="text-center mb-4">
        <h1 class="section-title">Gallery</h1>
        <hr class="section-divider">
    </div>
    {% if images %}
    <div class="row g-4">
        {% for image in images %}
        <div class="col-lg-3 col-md-4 col-sm-6">
            <div class="gallery-card" data-bs-toggle="modal" data-bs-target="#imageModal{{ loop.index }}">
                <img src="/uploads/{{ image['filename'] }}" alt="{{ image['desc'] }}">
                {% if image['desc'] %}
                <div class="card-body text-center">
                    <small>{{ image['desc'] }}</small>
                </div>
                {% endif %}
            </div>
        </div>

        <!-- Modal -->
        <div class="modal fade gallery-modal" id="imageModal{{ loop.index }}" tabindex="-1" aria-labelledby="imageModalLabel{{ loop.index }}" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="imageModalLabel{{ loop.index }}">{{ image['desc'] }}</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body p-0">
                        <img src="/uploads/{{ image['filename'] }}" class="img-fluid w-100" alt="{{ image['desc'] }}">
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p class="text-center" style="color: var(--obh-text-muted);">No photos yet. Check back soon!</p>
    {% endif %}
</div>
{% endblock %}
