<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Omega Beta Eta — Arab Fraternity{% endblock %}</title>

    <!-- SEO -->
    <meta name="description" content="{% block meta_description %}Omega Beta Eta is an Arab fraternity founded in 2018, fostering leadership, academic excellence, cultural pride, and lifelong brotherhood.{% endblock %}" />
    <meta name="keywords" content="{% block meta_keywords %}Omega Beta Eta, Arab fraternity, OBH, Greek life, Arab culture, brotherhood, leadership{% endblock %}" />
    <meta name="author" content="Jawad Alsahlani" />
    <meta name="robots" content="{% block meta_robots %}index, follow{% endblock %}" />
    <link rel="canonical" href="{{ request.url }}" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="{% block og_type %}website{% endblock %}" />
    <meta property="og:url" content="{{ request.url }}" />
    <meta property="og:site_name" content="Omega Beta Eta" />
    <meta property="og:title" content="{% block og_title %}Omega Beta Eta — Arab Fraternity{% endblock %}" />
    <meta property="og:description" content="{% block og_description %}Omega Beta Eta is an Arab fraternity fostering leadership, academic excellence, cultural pride, and lifelong brotherhood.{% endblock %}" />
    <meta property="og:image" content="{% block og_image %}{{ url_for('static', filename='images/og-image.png', _external=True) }}{% endblock %}" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{% block twitter_title %}Omega Beta Eta — Arab Fraternity{% endblock %}" />
    <meta name="twitter:description" content="{% block twitter_description %}Arab fraternity fostering leadership, academic excellence, cultural pride, and lifelong brotherhood.{% endblock %}" />
    <meta name="twitter:image" content="{% block twitter_image %}{{ url_for('static', filename='images/og-image.png', _external=True) }}{% endblock %}" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.ico') }}" />
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='images/OBHLogo.png') }}" />
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='images/apple-touch-icon.png') }}" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Omega Beta Eta",
      "url": "{{ request.host_url }}",
      "logo": "{{ url_for('static', filename='images/OBHLogo.png', _external=True) }}",
      "description": "Arab fraternity founded in 2018, fostering leadership, academic excellence, cultural pride, and lifelong brotherhood.",
      "foundingDate": "2018",
      "sameAs": [
        "https://www.instagram.com/omegabetaeta/",
        "https://www.youtube.com/@OmegaBetaEta"
      ],
      "creator": {
        "@type": "Person",
        "name": "Jawad Alsahlani",
        "url": "https://javvad.dev"
      }
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/main.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ url_for('static', filename='css/main.css') }}"
    />

  </head>
  <body>

    <header class="site-header" id="siteHeader">
      <div class="container-fluid d-flex justify-content-between align-items-center">
        <a href="/" class="link-no-style site-logo">
          <img src="/static/images/OBHLogo.png" alt="ΩBH" />
          <div class="site-logo-text">
            <span>Omega Beta Eta</span>
            <small>Fraternity</small>
          </div>
        </a>
        <nav class="navbar navbar-expand-lg">
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav site-nav">
              <a class="nav-link" href="/about/">About</a>
              <a class="nav-link" href="/brothers/">Brothers</a>
              <a class="nav-link" href="/gallery/">Gallery</a>
              <a class="nav-link" href="/calendar/">Calendar</a>
              <a class="nav-link" href="/contact/">Contact</a>
              <a class="nav-link" href="/donate/">Donate</a>
              <a class="nav-link" href="/apply/">Apply</a>
              <a class="nav-link" href="/portal/">Portal</a>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <div class="main-content-area">{% block content %}{% endblock %}</div>

    <footer class="site-footer">
      <div class="container text-center">
        <div class="d-flex justify-content-center gap-4 mb-3">
          <a href="https://www.instagram.com/omegabetaeta/?hl=en" class="social-icon" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-instagram"></i>
          </a>
          <a href="https://www.youtube.com/@OmegaBetaEta" class="social-icon" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-youtube"></i>
          </a>
        </div>
        <p class="copyright mb-0">&copy; {{ now().year if now is defined else '2026' }} Omega Beta Eta Arab Fraternity Incorporated.</p>
        <p class="credit mb-0">Built by <a href="https://javvad.dev" target="_blank" rel="noopener">Jawad Alsahlani</a></p>
      </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
      defer
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <script>
      window.addEventListener('scroll', function() {
        document.getElementById('siteHeader').classList.toggle('scrolled', window.scrollY > 10);
      });
      (function() {
        var path = window.location.pathname;
        document.querySelectorAll('.site-nav .nav-link').forEach(function(link) {
          if (path === link.getAttribute('href') || (link.getAttribute('href') !== '/' && path.startsWith(link.getAttribute('href')))) {
            link.classList.add('active');
          }
        });
      })();
    </script>
  </body>
</html>
