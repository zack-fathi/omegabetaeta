{% extends 'base.html' %}
{% block content %}
<div class="container py-5 brothers-directory">
    <div class="text-center mb-4">
        <h1 class="section-title">Active Brothers</h1>
        <hr class="section-divider">
    </div>

    <!-- Search -->
    <div class="brothers-search-wrap">
        <div class="brothers-search">
            <i class="fas fa-search"></i>
            <input type="text" id="brothersSearch" placeholder="Search by name, lion name, or line..." autocomplete="off">
        </div>
    </div>

    <div class="brothers-results-count" id="resultsCount"></div>

    <!-- Alphabetical list -->
    <div class="brothers-grid">
        {% for bro in brothers %}
        <a class="link-no-style brothers-card-link"
           href="/brothers/{{ bro['username'] }}/"
           data-name="{{ bro['fullname']|lower }}"
           data-lion="{{ (bro['lion_name'] or '')|lower }}"
           data-line="{{ (bro['line_name'] or '')|lower }}">
            <div class="brothers-card">
                <div class="brothers-card-img">
                    <img src="/uploads/{{ bro.profile_picture or 'default.jpg' }}" alt="{{ bro.fullname }}">
                </div>
                <div class="brothers-card-body">
                    <span class="brothers-card-name">{{ bro.fullname }}</span>
                    <span class="brothers-card-detail">{{ bro.line_name }}{% if bro.lion_name %} - {{ bro.lion_name }}{% endif %}</span>
                </div>
            </div>
        </a>
        {% endfor %}
    </div>

    <div class="brothers-no-results" id="noResults" style="display:none;">
        <i class="fas fa-search"></i>
        <p>No brothers match your search.</p>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('brothersSearch');
    const cards = document.querySelectorAll('.brothers-card-link');
    const noResults = document.getElementById('noResults');
    const resultsCount = document.getElementById('resultsCount');

    function filterBrothers() {
        const query = searchInput.value.toLowerCase().trim();
        let visible = 0;

        cards.forEach(function(card) {
            const name = card.dataset.name;
            const lion = card.dataset.lion;
            const line = card.dataset.line;

            const matchSearch = !query || name.includes(query) || lion.includes(query) || line.includes(query);

            card.style.display = matchSearch ? '' : 'none';
            if (matchSearch) visible++;
        });

        noResults.style.display = visible === 0 ? '' : 'none';
        resultsCount.textContent = query ? visible + ' brother' + (visible !== 1 ? 's' : '') + ' found' : '';
    }

    searchInput.addEventListener('input', filterBrothers);
});
</script>
{% endblock %}
