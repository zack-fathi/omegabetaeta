{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="text-center mb-4">
        <h1 class="section-title">Active Brothers</h1>
        <hr class="section-divider">
    </div>
    <div class="row g-4">
        {% for brother in brothers %}
        <div class="col-lg-3 col-md-4 col-sm-6">
            <a href="/brothers/{{ brother['username'] }}/" class="link-no-style">
                <div class="obh-card h-100">
                    <div class="card-img-container">
                        <img src="/uploads/{{ brother.profile_picture }}" alt="{{ brother.fullname }}">
                    </div>
                    <div class="card-body text-center">
                        <h5 class="card-title">{{ brother.fullname }}</h5>
                        <p class="card-subtitle mb-0">{{ brother.line_name }}</p>
                    </div>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
