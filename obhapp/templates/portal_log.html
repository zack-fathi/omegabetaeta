{% extends 'portal_base.html' %}
{% block content %}
<div class="container mt-2">
    <h2 class="portal-heading">Change Log</h2>
    <div class="table-responsive mt-3">
        <table class="portal-table">
            <thead>
                <tr>
                    <th>Change Time</th>
                    <th>User ID</th>
                    <th>Description</th>
                </tr>
            </thead>
            <tbody>
                {% for entry in log %}
                <tr>
                    <td>{{ entry.change_time }}</td>
                    <td>{{ entry.user_id }}</td>
                    <td>{{ entry.desc }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
