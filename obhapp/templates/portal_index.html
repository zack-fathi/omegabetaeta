{% extends 'portal_base.html' %} {% block content %}
<section class="portal-welcome">
  <h1>Welcome back, {{ session.get('name') }}!</h1>
  <p>Stay updated with the latest fraternity news and events.</p>
  <a href="/portal/help/" class="btn btn-portal btn-sm mt-2"><i class="fas fa-question-circle me-1"></i>Need help? View the guide</a>
</section>

<section class="portal-calendar-card">
  <div class="card-header text-center">
    <h2 class="mb-0">Fraternity Calendar</h2>
  </div>
  <div class="card-body">
    <div id="calendar"></div>
  </div>
</section>

<script>
  document.addEventListener("DOMContentLoaded", function () {
  var calendarEl = document.getElementById("calendar");
  var calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: "dayGridMonth",
    events: {
      url: '/api/calendar-events/',
      extraParams: { scope: 'portal' }
    },
    headerToolbar: {
      left: "prev,next today",
      center: "title",
      right: "dayGridMonth,timeGridWeek,timeGridDay",
    },
  });
  calendar.render();
});
</script>
{% endblock %}
