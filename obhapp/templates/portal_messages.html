{% extends 'portal_base.html' %}
{% block content %}
<div class="container mt-2">
    <h2 class="portal-heading">Contact Messages</h2>
    <div class="table-responsive mt-3">
        <table class="portal-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Subject</th>
                    <th>Message</th>
                </tr>
            </thead>
            <tbody>
                {% for message in messages %}
                <tr>
                    <td>{{ message.created_at }}</td>
                    <td>{{ message.name }}</td>
                    <td>
                        <a href="mailto:{{ message.email }}" style="color: var(--portal-red);">{{ message.email }}</a>
                    </td>
                    <td>{{ message.subject }}</td>
                    <td>{{ message.message }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
